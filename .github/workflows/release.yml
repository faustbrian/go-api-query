name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  GOTOOLCHAIN: local

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out query package
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: go-api-query
      - name: Check out pinned validation dependency
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: faustbrian/go-validation
          ref: 238f8ef9a96a498b45cb34b7bee5edbdf55f9104
          path: go-validation
      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go-api-query/go.mod
          cache-dependency-path: go-api-query/go.sum
      - name: Run complete release-equivalent gates
        working-directory: go-api-query
        run: make ci
      - name: Publish GitHub release
        working-directory: go-api-query
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --verify-tag --generate-notes
